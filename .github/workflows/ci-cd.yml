name: CI/CD

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}-frontend:latest

      - name: Trigger Dekoploy deploy (placeholder)
        env:
          DEKOPLOY_TOKEN: ${{ secrets.DEKOPLOY_TOKEN }}
        run: |
          echo "Replace this step with a Dekoploy API call or CLI to trigger a deploy."
          # Example (replace URL and payload):
          # curl -X POST -H "Authorization: Bearer $DEKOPLOY_TOKEN" \
          #   -H "Content-Type: application/json" \
          #   -d '{"project":"your-project","ref":"${{ github.sha }}"}' \
          #   https://api.dekoploy.example/deploy

      # Optional: deploy via SSH if you prefer not to use Dekoploy yet
      - name: Deploy via SSH to Hostinger (optional)
        if: false
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd /path/to/app
            docker compose pull
            docker compose up -d --remove-orphans
